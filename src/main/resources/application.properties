spring.application.name=homes
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.address=0.0.0.0
server.port=8080

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/homes?useUnicode=true&characterEncoding=utf8&useSsl=false
spring.datasource.username=homes
spring.datasource.password=homespw

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.eksystems.homes

server.servlet.jsp.init-parameters.development=true

spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
logging.level.org.apache.ibatis=DEBUG
logging.level.org.mybatis=DEBUG

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Gemini AI
gemini.api.key=AIzaSyBpi6mfuwkVikp6NZt2mRfKkX9pqbIf9p4
gemini.model=gemini-2.5-flash

# Web Push (VAPID)
push.vapid.subject=mailto:admin@homes.local
push.vapid.keys-file=./vapid-keys.json
