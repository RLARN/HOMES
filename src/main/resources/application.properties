spring.application.name=homes

# 시크릿 값은 application-secret.properties 에서 관리 (gitignore 등록됨)
spring.config.import=optional:classpath:application-secret.properties
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.address=0.0.0.0
server.port=8080

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/homes?useUnicode=true&characterEncoding=utf8&useSsl=false
spring.datasource.username=homes
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.eksystems.homes

server.servlet.jsp.init-parameters.development=true

spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
logging.level.org.apache.ibatis=DEBUG
logging.level.org.mybatis=DEBUG

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Assistant AI
assistant.provider=ollama

# Gemini AI
gemini.api.key=
gemini.model=gemini-2.5-flash

# Ollama AI
ollama.base-url=http://localhost:11434
#ollama.model=gemma4:26b
ollama.model=gemma4:e4b

# MVC async timeout (AI 분석 장시간 응답 허용)
spring.mvc.async.request-timeout=250000

# Web Push (VAPID)
push.vapid.subject=mailto:admin@homes.local
push.vapid.keys-file=./vapid-keys.json

# DMS File Storage
dms.upload.path=C:/homes-uploads/dms
sns.upload.path=C:/homes-uploads/sns
dms.quota.bytes=1073741824
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Google Calendar API
# Google Cloud Console에서 Calendar API 사용 설정 후 Web OAuth Client ID / API Key를 입력
google.calendar.client-id=
google.calendar.api-key=
